<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClickBACON — Under Maintenance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green:        #2e7d32;
      --green-bg:     #e8f5e9;
      --green-border: #c8e6c9;
      --white:        #ffffff;
      --surface:      #f5f7f5;
      --text:         #1a1a1a;
      --muted:        #6b7280;
      --border:       #e5e7eb;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .logo {
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 48px 52px 44px;
      max-width: 460px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    .icon-wrap {
      width: 64px; height: 64px;
      background: var(--green-bg);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 22px;
    }
    .icon-wrap svg { width: 28px; height: 28px; }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: #fff3cd; color: #856404;
      border: 1px solid #ffc107;
      font-size: 11.5px; font-weight: 600;
      padding: 4px 12px; border-radius: 99px; margin-bottom: 20px;
    }
    .badge-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #ffc107;
    }

    h1 {
      font-size: 22px; font-weight: 700; color: var(--text);
      margin-bottom: 10px; letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 13.5px; color: var(--muted);
      line-height: 1.7; margin-bottom: 28px;
    }

    hr {
      border: none; border-top: 1px solid var(--border); margin-bottom: 20px;
    }

    .footer-note {
      font-size: 12px; color: var(--muted); line-height: 1.6;
    }
    .footer-note a { color: var(--green); text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>

  <!-- Inline SVG logo matching the real ClickBACON wordmark -->
  <div class="logo">
    <svg width="170" height="38" viewBox="0 0 170 38" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Wavy lines (coral/red) -->
      <path d="M2 9 Q5 5.5 8 9 Q11 12.5 14 9" stroke="#e05a4e" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <path d="M2 15 Q5 11.5 8 15 Q11 18.5 14 15" stroke="#e05a4e" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <path d="M2 21 Q5 17.5 8 21 Q11 24.5 14 21" stroke="#e05a4e" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <!-- Cursor arrow (coral/red) -->
      <path d="M9 25 L9 33 L12 30 L14.5 35 L16.5 34 L14 29 L17.5 29 Z" fill="#e05a4e"/>
      <!-- clickBACON wordmark -->
      <text x="26" y="26" font-family="Inter, sans-serif" font-size="17" letter-spacing="-0.4">
        <tspan font-weight="600" fill="#1a1a1a">click</tspan><tspan font-weight="800" fill="#2e7d32">BACON</tspan>
      </text>
    </svg>
  </div>

  <div class="card">

    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="#2e7d32" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>

    <div class="badge">
      <div class="badge-dot"></div>
      Deployment in progress
    </div>

    <h1>We'll be right back</h1>

    <p class="subtitle">
      ClickBACON is currently undergoing scheduled maintenance.<br />
      We apologize for any inconvenience.
    </p>

    <hr />

    <div class="footer-note">
      For urgent assistance, contact <a href="mailto:support@clickbacon.com">support@clickbacon.com</a>
    </div>

  </div>

  <script>
    (function () {
      const BASE_URL = window.location.origin + window.location.pathname;
      const isFile   = window.location.protocol === 'file:';

      function lockURL() {
        if (isFile) {
          // file:// protocol — hard redirect since history API is blocked
          if (window.location.href !== BASE_URL) {
            window.location.replace(BASE_URL);
          }
        } else {
          try { history.replaceState(null, '', BASE_URL); } catch (e) {}
        }
      }

      // On load: redirect immediately if URL has extra segments
      lockURL();

      if (!isFile) {
        const _replace = history.replaceState.bind(history);
        history.pushState    = function (s, t, url) { try { _replace(s, t, BASE_URL); } catch(e) {} };
        history.replaceState = function (s, t, url) {
          try { _replace(s, t, (url && url !== BASE_URL) ? BASE_URL : url); } catch(e) {}
        };
        window.addEventListener('popstate',   lockURL);
        window.addEventListener('hashchange', lockURL);
      }

      document.addEventListener('click', function (e) {
        const a = e.target.closest('a[href]');
        if (a && !a.href.startsWith('mailto:') && !a.href.startsWith('tel:')) {
          e.preventDefault();
          lockURL();
        }
      }, true);

    })();
  </script>

</body>
</html>
